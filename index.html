<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Nude Pastel</title>

<style>

/* =========================
   RESET BÁSICO
========================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}


/* =========================
   VARIÁVEIS DE CORES
========================= */
:root {

  --fundo-principal: #fdf7f5;
  --card-bg: #ffffff;

  --texto-principal: #5c4b4b;
  --texto-secundario: #8a6f6f;

  --nude-rose: #f4c6cc;
  --nude-pessego: #f8d2b3;
  --nude-lavanda: #e3d6f3;
  --nude-areia: #f3e2cf;
  --nude-caramelo: #e6bfa8;
  --nude-salvia: #cfe3d8;

  --hover-rose: #eaaab2;
  --hover-pessego: #f2b98f;
  --hover-lavanda: #d1bdf0;
  --hover-areia: #e7cfb4;
  --hover-caramelo: #d9a989;
  --hover-salvia: #b9d5c8;

  --sombra: 0 6px 18px rgba(0,0,0,0.08);
}


/* =========================
   FUNDO
========================= */
body {
  background: linear-gradient(135deg, #fff7f4, #fdf1ee);
  color: var(--texto-principal);
  padding: 40px;
}


/* =========================
   CARD
========================= */
.card {
  background: var(--card-bg);
  padding: 30px;
  border-radius: 20px;
  box-shadow: var(--sombra);
  max-width: 420px;
  margin: auto;
  text-align: center;
}


/* =========================
   IMAGEM OPCIONAL
========================= */
.card img {
  width: 100%;
  border-radius: 16px;
  margin-bottom: 20px;
  object-fit: cover;
}


/* =========================
   TITULO
========================= */
.card h2 {
  margin-bottom: 10px;
  font-weight: 600;
}


/* =========================
   TEXTO
========================= */
.card p {
  color: var(--texto-secundario);
  margin-bottom: 25px;
}


/* =========================
   BOTÕES BASE
========================= */
.btn {
  border: none;
  padding: 12px 20px;
  border-radius: 12px;
  cursor: pointer;
  margin: 6px;
  font-weight: 500;
  transition: 0.25s ease;
}


/* =========================
   CORES DOS BOTÕES
========================= */

.btn-rose { background: var(--nude-rose); }
.btn-rose:hover { background: var(--hover-rose); }

.btn-pessego { background: var(--nude-pessego); }
.btn-pessego:hover { background: var(--hover-pessego); }

.btn-lavanda { background: var(--nude-lavanda); }
.btn-lavanda:hover { background: var(--hover-lavanda); }

.btn-areia { background: var(--nude-areia); }
.btn-areia:hover { background: var(--hover-areia); }

.btn-caramelo { background: var(--nude-caramelo); }
.btn-caramelo:hover { background: var(--hover-caramelo); }

.btn-salvia { background: var(--nude-salvia); }
.btn-salvia:hover { background: var(--hover-salvia); }

</style>
</head>

<body>

<div class="card">

  <!-- IMAGEM OPCIONAL -->
  <!-- se não quiser imagem, pode apagar essa linha -->
  <img src="https://picsum.photos/500/300" alt="Imagem decorativa">

  <h2>Título do Card</h2>
  <p>Descrição delicada em tons nude pastel mais vivos e elegantes.</p>

  <button class="btn btn-rose">Confirmar</button>
  <button class="btn btn-pessego">Editar</button>
  <button class="btn btn-lavanda">Detalhes</button>
  <button class="btn btn-salvia">Salvar</button>

</div>

</body>
</html>
