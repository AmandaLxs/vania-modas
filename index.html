<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vânia Modas</title>

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f6efe8;
    color: #4a3f35;
}

/* HEADER */
header {
    background: white;
    padding: 25px 20px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.logo {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;
}

.sublogo {
    font-size: 13px;
    letter-spacing: 3px;
    color: #a38f7c;
}

/* HERO */
.hero {
    text-align: center;
    padding: 70px 20px;
}

.hero h1 {
    font-size: 32px;
    margin-bottom: 15px;
}

.hero p {
    font-size: 18px;
    margin-bottom: 30px;
}

.botao {
    display: inline-block;
    background: #c7a17a;
    color: white;
    padding: 14px 30px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.botao:hover {
    background: #b38f6c;
}

/* PRODUTOS */
.produtos {
    padding: 60px 20px;
    max-width: 1100px;
    margin: auto;
}

.produtos h2 {
    text-align: center;
    margin-bottom: 40px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
}

.card {
    background: white;
    border-radius: 8px;
    padding: 15px;
    text-align: center;
}

.foto-produto {
    background: #eee;
    height: 260px;
    border-radius: 6px;
    margin-bottom: 15px;
}

.nome-produto {
    font-weight: bold;
    margin-bottom: 5px;
}

.preco {
    color: #c7a17a;
    font-weight: bold;
}

/* SOBRE */
.sobre {
    padding: 60px 20px;
    max-width: 800px;
    margin: auto;
    text-align: center;
}

/* INSTAGRAM */
.instagram {
    text-align: center;
    padding: 40px 20px;
}

/* FOOTER */
footer {
    background: white;
    text-align: center;
    padding: 25px;
    margin-top: 40px;
}

/* WHATSAPP FLUTUANTE */
.whatsapp {
    position: fixed;
    right: 20px;
    bottom: 20px;
    background: #25d366;
    color: white;
    padding: 14px 18px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

</style>

</head>
<body>

<header>
    <div class="logo">VÂNIA</div>
    <div class="sublogo">MODAS</div>
</header>

<section class="hero">
    <h1>Moda feminina moderna e elegante</h1>
    <p>Peças selecionadas com sofisticação para mulheres reais.</p>
    <a class="botao" href="https://wa.me/5511971386664">Comprar pelo WhatsApp</a>
</section>

        </div>

        <div class="card">
            <div class="foto-produto"></div>
            <div class="nome-produto">Conjunto Feminino</div>
            <div class="preco">R$ 189,90</div>
        </div>
